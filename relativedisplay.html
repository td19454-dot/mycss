<!DOCTYPE html>
<html lang="en">
<head>
    <title>Relative Display</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #first {
            height: 100px;
            width: 100px;
            background-color: lightblue;
            font-size: 10px;

        }
        #second {
            height: 50%;
            width : 50%;
            font-size: 1.5em;
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div id="first">
        first 
    <div id="second">
        second
    </div>
    </div>
</body>
</html>
