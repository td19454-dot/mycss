<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box {
            height: 100px;
            width: 100px;
            background-color: lightblue;
            margin : 20px;
            display: block;
        }
        #box1 {
               background-color: rgb(28, 63, 74);
        }
        #box2 {
               background-color: rgb(107, 7, 71);
        }

        #box3 {
               background-color: rgb(216, 216, 13);
               display : inline;
        }
        #box4 {
               background-color: rgb(216, 13, 216);
               display:inline;
        }
        #box5 {
               background-color: rgb(13, 216, 216);
               display : inline-block;
        }
        #box6 {
               background-color: rgb(239, 138, 6);
               display : inline-block;
        }
        #box {
               background-color: rgb(216, 13, 13);
               display : none;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">box 1</div>
    <div id="box2" class="box">box 2</div>
    <div id="box3" class="box">box 3</div>
    <div id="box4" class="box">box 4</div>
    <div id="box5" class="box">box 5</div>
    <div id="box6" class="box">box 6</div>
    <div id="box" class="box">box</div>
</body>
</html>
