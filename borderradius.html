<!DOCTYPE html>
<html lang="en">
<head>
    <title>Padding</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }

        #first {
            border : 2px solid black;
            border-radius: 20px;
            background-color: lightblue;
            box-sizing: content-box;
        }
        #second {
            border : 2px dotted rgb(4, 81, 70);
                        border-radius: 20px 20px 20px 80px;
            background-color: lightcoral;
            box-sizing: border-box;

        }
        .pad {
            height : 100px;
            width : 100px;
            padding : 20px;
            margin : 5px 5px 5px 5px;
        }
    </style>
</head>
<body>
    <div id = "first" class = "pad">padding checker1</div>
    <div id="second" class="pad">padding checker2</div>
</body>
</html>
