<!DOCTYPE html>
<html lang="en">
<head>
    <title>practice sheet 4</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #box {
            height: 200px;
            width: 200px;
            background-color: lightblue;

        }
        #first {
            padding: 10px 15px 10px 15px;
             background-color: lightcoral;
             margin : 100px;
             border : 2px dotted black;
             border-radius: 40px;
        }
        #box2 {
            height: 200px;
            width: 200px;
            background-color: lightgreen;
            margin : 20px;
            box-sizing: border-box;
             border : 2px solid black;
        }
        #box3 {
            height: 200px;
            width: 200px;
            background-color: rgb(216, 216, 13);
            margin : 20px;
            border : 2px solid black;
            box-sizing: content-box;
        }
</style>
</head>
<body>
    <div id="box">box model</div>
    <button id = "first">Click me</button>
    <div id="box2">box model2</div>
    <div id="box3">box model3</div>
</body>
</html>
