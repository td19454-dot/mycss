<!DOCTYPE html>
<html lang="en">
<head>
    <title>visibility</title>
    <style>
      #div {
        background-color: rgb(235, 197, 235);
        color: red;
      }
      #div2 {
        background-color: rgb(167, 227, 225);
        color: rgb(98, 6, 49);
        visibility: hidden ;
      }
        #div3 {
            background-color: rgb(181, 208, 101);
            color: rgb(13, 4, 47);
        }
        .div {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div id = "div" class="div">first</div><br>
    <div id = "div2" class="div">second</div><br>
    <div id = "div3" class="div">third</div>
</body>
</html>
