<!DOCTYPE html>
<html lang="en">
<head>
    <title>font weight</title>
    <style>
        .p {
            font-style: italic;
            font-weight: 50;
        }
        .p2 {
            font-style: normal;
            font-weight: 400;
        }
        .p3 {
            font-style: oblique;
            font-weight: 700;
        } 
    </style>
</head>
<body>
    <p class  = "p">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Dolor, laboriosam.</p>
    <p class="p2">Lorem ipsum, dolor sit amet consectetur adipisicing elit. In, aspernatur.</p>
    <p class="p3">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
</body>
</html>
